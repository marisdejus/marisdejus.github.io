<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Māris Dejus</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link href="https://fonts.googleapis.com/css2?family=Kode+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0; padding: 0;
      background: #111;
      font-family: 'Kode Mono', monospace;
      transition: background 0.2s, color 0.2s;
      overflow-x: hidden;
      overflow-y: auto;
    }

    body.light { background: #fff; }

    /* ── HERO SECTION ── */

      position: relative;
      width: 100%;
      height: 100vh;
      overflow: hidden;
    }

    #hero canvas {
      display: block;
      position: absolute;
      top: 0; left: 0;
    }

    /* disclaimer bar */
    #disclaimer {
      position: absolute;
      bottom: 1rem;
      left: 50%;
      transform: translateX(-50%);
      width: 90%;
      max-width: 700px;
      text-align: center;
      font-family: 'Kode Mono', monospace;
      font-size: 0.55rem;
      letter-spacing: 0.12em;
      color: #555;
      pointer-events: none;
      z-index: 10;
      line-height: 1.8;
      transition: color 0.2s;
    }

    body.light #disclaimer { color: #aaa; }

    /* scroll arrow */
    #scroll-arrow:hover { color: #ccc; }
    body.light #scroll-arrow { color: #bbb; }

  </style>
</head>
<body>

<!-- ── HERO ── -->
<section id="hero">
</section>

<script data-cfasync="false" src="/cdn-cgi/scripts/5c5dd728/cloudflare-static/email-decode.min.js"></script><script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.min.js"></script>
<script>

// ═══════════════════════════════════════════════
// CONTENT
// ═══════════════════════════════════════════════
// Stage font sizes are computed dynamically in computeStages()
// based on canvas width — see below
let stages = [
  { lines: ['Māris', 'Dejus'], fontSize: 249, spacing: 270 },
  { lines: ['I make things that change how people hear and see.', 'Sound / Image / Code'], fontSize: 40, spacing: 60 },
  { lines: ['Music, sound design, motion graphics, video art.', 'For brands, agencies, theatres and productions.'], fontSize: 27, spacing: 66 },
  { lines: ['dejusmaris@gmail.com'], fontSize: 15, spacing: 26 }
];

function computeStages(w) {
  // For each stage, find font size so the longest line fits within canvas width
  // No line breaking — pure scaling
  const pad = Math.max(16, Math.floor(w * 0.05));
  const availW = w - pad * 2;

  function fitFontSize(lines, maxFs, minFs) {
    let fs = maxFs;
    // find the widest line at maxFs
    // binary search downward until all lines fit
    for (let attempt = 0; attempt < 60; attempt++) {
      // can't call p.textWidth outside draw — use approximation: Kode Mono is ~0.62 ratio
      const charW = fs * 0.62;
      const longest = Math.max(...lines.map(l => l.length * charW));
      if (longest <= availW) break;
      fs = Math.floor(fs * availW / longest * 0.95);
    }
    return Math.max(minFs, Math.min(maxFs, fs));
  }

  stages[1].fontSize = fitFontSize(stages[1].lines, Math.min(40, Math.floor(w * 0.05)), 10);
  stages[1].spacing = Math.floor(stages[1].fontSize * 1.7);
  stages[2].fontSize = fitFontSize(stages[2].lines, Math.min(27, Math.floor(w * 0.035)), 9);
  stages[2].spacing = Math.floor(stages[2].fontSize * 2.5);
  stages[3].fontSize = fitFontSize(stages[3].lines, Math.min(15, Math.floor(w * 0.025)), 8);
  stages[3].spacing = Math.floor(stages[3].fontSize * 1.8);
}

// ═══════════════════════════════════════════════
// AUDIO
// ═══════════════════════════════════════════════
let masterGain;
let audioCtx;

const chordProgression = ['C', 'Am', 'C', 'G'];
const chords = {
  C:  [261.63, 329.63, 392.00, 523.25, 659.25, 783.99],
  Am: [220.00, 261.63, 329.63, 440.00, 523.25, 659.25],
  G:  [196.00, 246.94, 392.00, 493.88, 587.33, 783.99]
};

// ═══════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════
let staticParticles = [];
let floatingParticles = [];
let centerX, centerY;
let margin = 40;
let stage = 0;
let currentChordStage = 0;
let matrixMode = false;
let currentStatic = null;
let draggingParticle = null;
let isDarkMode = true;
let p5canvas;
// computed title size — kept separate so stages[0] is never mutated on resize
let titleFontSize = 249;
let titleSpacing = 270;
let titleReady = false; // set true once showStatic(0) runs inside draw loop

// ═══════════════════════════════════════════════
// P5 INSTANCE (scoped to #hero)
// ═══════════════════════════════════════════════
const sketch = function(p) {

  // ── classes first so they exist when setup/draw run ──

  class StaticChar {
    constructor(char, x, y, size, chord) {
      this.char = char;
      this.x = x; this.y = y;
      this.homeX = x; this.homeY = y;
      this.size = size; this.chord = chord;
      this.hue = 0; this.hovered = false; this.wasHovered = false;
      this.vx = 0; this.vy = 0;
    }
    applyRepulsion() {
      const dx = this.x - p.mouseX, dy = this.y - p.mouseY;
      const dSq = dx*dx + dy*dy;
      const r = 130;
      if (dSq < r*r) {
        const d = Math.sqrt(dSq) || 0.01;
        const f = (r - d) / r;
        this.vx += (dx/d) * f * 3.5;
        this.vy += (dy/d) * f * 3.5;
      }
    }
    update() {
      this.vx += (this.homeX - this.x) * 0.08;
      this.vy += (this.homeY - this.y) * 0.08;
      this.vx *= 0.75; this.vy *= 0.75;
      this.x += this.vx; this.y += this.vy;
    }
    isMouseOver() {
      p.textSize(this.size);
      return p.dist(p.mouseX, p.mouseY, this.x, this.y) < p.textWidth(this.char) * 1.0;
    }
    display() {
      p.textSize(this.size);
      p.fill(this.hovered ? this.hue : 0, this.hovered ? 100 : 0, this.hovered ? 100 : (isDarkMode ? 90 : 15));
      p.text(this.char, this.x, this.y);
    }
    playSound() {
      if (!audioCtx || audioCtx.state !== 'running' || !masterGain) return;
      const freqs = chords[this.chord];
      const base = freqs[this.char.charCodeAt(0) % freqs.length];
      const freq = base * Math.pow(2, Math.floor(p.random(-1,2))) * Math.pow(2, p.random(-3,3)/1200);
      const osc = audioCtx.createOscillator(), g = audioCtx.createGain();
      const filt = audioCtx.createBiquadFilter(), pan = audioCtx.createStereoPanner();
      osc.type = 'sine'; osc.frequency.value = freq;
      g.gain.setValueAtTime(0, audioCtx.currentTime);
      g.gain.linearRampToValueAtTime(0.08, audioCtx.currentTime + 0.02);
      filt.type = 'lowpass'; filt.frequency.value = 600;
      pan.pan.value = p.map(this.x, 0, p.width, -1, 1);
      osc.connect(g); g.connect(filt); filt.connect(pan); pan.connect(masterGain);
      osc.start();
      g.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.2);
      osc.stop(audioCtx.currentTime + 0.25);
    }
  }

  class Particle {
    constructor(char, x, y, size) {
      this.char = char; this.x = x; this.y = y; this.size = size;
      this.vx = p.random(-0.5,0.5); this.vy = p.random(-0.5,0.5);
      this.hue = p.random(360);
      this.isDragging = false; this.offsetX = 0; this.offsetY = 0;
      this.hoverPlayed = false;
      this.oscillator = null; this.gainNode = null; this.panner = null; this.filter = null;
    }
    update() {
      const over = this.isMouseOver();
      if (over && !this.hoverPlayed && !this.isDragging) {
        this.hue = p.random(360); this.playSound(false); this.hoverPlayed = true;
      }
      if (!over) this.hoverPlayed = false;

      if (this.isDragging) {
        this.x = p.mouseX + this.offsetX;
        this.y = p.mouseY + this.offsetY;
        if (this.panner) this.panner.pan.setValueAtTime(p.map(this.x, 0, p.width, -1, 1), audioCtx.currentTime);
        if (this.filter) this.filter.frequency.setValueAtTime(p.map(this.y, 0, p.height, 8000, 300), audioCtx.currentTime);
      } else {
        const dx = this.x - p.mouseX, dy = this.y - p.mouseY;
        const dSq = dx*dx + dy*dy;
        const r = Math.max(60, this.size * 0.8);
        if (dSq < r*r) {
          const d = Math.sqrt(dSq) || 0.01;
          const f = (r - d) / r;
          this.vx += (dx/d) * f * 2.5;
          this.vy += (dy/d) * f * 2.5;
        }
        this.vx += p.random(-0.05, 0.05); this.vy += p.random(-0.05, 0.05);
        this.x += this.vx; this.y += this.vy;
        const bm = Math.max(margin, this.size * 0.5);
        if (this.x < bm || this.x > p.width - bm)  { this.vx *= -1; this.x = p.constrain(this.x, bm, p.width - bm); }
        if (this.y < bm || this.y > p.height - bm) { this.vy *= -1; this.y = p.constrain(this.y, bm, p.height - bm); }
        this.vx *= 0.995; this.vy *= 0.995;
      }
      this.hue = (this.hue + 0.5) % 360;
    }
    display() {
      p.fill(this.hue, 100, 100);
      p.textSize(this.size);
      p.text(this.char, this.x, this.y);
    }
    isMouseOver() {
      p.textSize(this.size);
      return p.dist(p.mouseX, p.mouseY, this.x, this.y) < p.textWidth(this.char);
    }
    playSound(sustain = false) {
      if (!audioCtx || !masterGain) return;
      const chord = chordProgression[Math.min(currentChordStage, chordProgression.length - 1)];
      const freqs = chords[chord];
      const base = freqs[this.char.charCodeAt(0) % freqs.length];
      const freq = base * Math.pow(2, Math.floor(p.random(-1,2)));
      const osc = audioCtx.createOscillator(), g = audioCtx.createGain();
      const filt = audioCtx.createBiquadFilter(), eq = audioCtx.createBiquadFilter();
      const pan = audioCtx.createStereoPanner();
      osc.type = 'sine'; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
      g.gain.setValueAtTime(0, audioCtx.currentTime);
      g.gain.linearRampToValueAtTime(0.05, audioCtx.currentTime + 0.01);
      filt.type = 'lowpass'; filt.frequency.setValueAtTime(600, audioCtx.currentTime);
      const panVal = p.map(this.x, 0, p.width, -1, 1);
      pan.pan.setValueAtTime(panVal, audioCtx.currentTime);
      if (sustain) this.panner = pan;
      eq.type = 'lowshelf'; eq.frequency.setValueAtTime(400, audioCtx.currentTime);
      eq.gain.setValueAtTime(p.map(Math.abs(panVal), 0, 1, 0, -12), audioCtx.currentTime);
      osc.connect(g); g.connect(filt); filt.connect(eq); eq.connect(pan); pan.connect(masterGain);
      osc.start();
      if (sustain) {
        filt.frequency.linearRampToValueAtTime(6000, audioCtx.currentTime + 1.5);
        this.oscillator = osc; this.gainNode = g; this.filter = filt;
      } else {
        g.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.2);
        osc.stop(audioCtx.currentTime + 0.25);
      }
    }
    stopSound() {
      if (this.oscillator && this.gainNode) {
        this.gainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.1);
        this.oscillator.stop(audioCtx.currentTime + 0.15);
        this.oscillator.disconnect(); this.gainNode.disconnect();
        this.oscillator = null; this.gainNode = null;
      }
    }
  }

  // ── helpers ──

  let staticHoverHues = {};

  function wrapLines(textArray, fontSize, noWrap) {
    const wrapped = [];
    p.textSize(fontSize);
    for (let line of textArray) {
      if (!line) { wrapped.push(''); continue; }
      if (noWrap) { wrapped.push(line); continue; }
      const words = line.split(' ');
      let cur = '';
      for (const word of words) {
        const test = cur + word + ' ';
        if (p.textWidth(test) > p.width - Math.max(20, margin) * 2) { wrapped.push(cur.trim()); cur = word + ' '; }
        else cur = test;
      }
      wrapped.push(cur.trim());
    }
    return wrapped;
  }

  function computeTitleSize() {
    const pad = Math.floor(p.width * 0.06);
    const availW = p.width - pad * 2;
    p.textSize(100);
    const refW = Math.max(p.textWidth('Māris'), p.textWidth('Dejus'));
    let fs = Math.floor(100 * availW / refW * 0.92);
    p.textSize(fs);
    const checkW = Math.max(p.textWidth('Māris'), p.textWidth('Dejus'));
    if (checkW > availW) fs = Math.floor(fs * (availW / checkW) * 0.92);
    fs = Math.min(fs, Math.floor(p.height * 0.36));
    fs = Math.max(fs, 18);
    titleFontSize = fs;
    titleSpacing = Math.floor(fs * 1.05);
  }

  function buildTitle() {
    computeTitleSize();
    const lines = wrapLines(stages[0].lines, titleFontSize);
    staticParticles = [];
    const pad = Math.floor(p.width * 0.06);
    const availW = p.width - pad * 2;
    p.textSize(titleFontSize);
    const yStart = p.height / 2 - ((lines.length - 1) * titleSpacing) / 2;
    for (let i = 0; i < lines.length; i++) {
      const line = lines[i];
      if (!line) continue;
      const lineW = p.textWidth(line);
      const n = line.length;
      const gap = n > 1 ? (availW - lineW) / (n - 1) * 0.7 : 0;
      let x = pad;
      for (let j = 0; j < n; j++) {
        const ch = line[j];
        const cw = p.textWidth(ch);
        staticParticles.push(new StaticChar(ch, x + cw/2, yStart + i*titleSpacing, titleFontSize, chordProgression[0]));
        x += cw + gap;
      }
    }
    currentChordStage = 0;
  }

  function showStatic(idx) {
    const fontSize = idx === 0 ? titleFontSize : stages[idx].fontSize;
    const noWrap = idx > 0;
    currentStatic = wrapLines(stages[idx].lines, fontSize, noWrap);
  }

  function getStaticBaseY() { return centerY; }

  function drawStaticText() {
    const s = stages[stage];
    p.textSize(s.fontSize);
    const isLast = stage === stages.length - 1;
    let yStart = isLast
      ? p.height - margin - (currentStatic.length - 1) * s.spacing
      : getStaticBaseY() - ((currentStatic.length - 1) * s.spacing) / 2;

    for (let i = 0; i < currentStatic.length; i++) {
      const line = currentStatic[i];
      if (!line) continue;
      const lineWidth = p.textWidth(line);
      let x = centerX - lineWidth / 2;
      const y = yStart + i * s.spacing;
      for (let j = 0; j < line.length; j++) {
        const ch = line[j];
        const cw = p.textWidth(ch);
        const cx = x + cw / 2;
        const key = stage + '_' + i + '_' + j;
        const over = p.dist(p.mouseX, p.mouseY, cx, y) < cw * 0.8;
        if (over) {
          if (!staticHoverHues[key]) {
            staticHoverHues[key] = p.random(360);
            if (audioCtx && audioCtx.state === 'running' && masterGain) playStaticSound(ch.charCodeAt(0), cx);
          }
          p.fill(staticHoverHues[key], 100, 100);
        } else {
          staticHoverHues[key] = null;
          p.fill(0, 0, isDarkMode ? 90 : 10);
        }
        p.text(ch, x, y);
        x += cw;
      }
    }
  }

  function playStaticSound(charCode, x) {
    const chord = chordProgression[Math.min(currentChordStage, chordProgression.length - 1)];
    const freqs = chords[chord];
    const base = freqs[charCode % freqs.length];
    const freq = base * Math.pow(2, Math.floor(p.random(-1,2))) * Math.pow(2, p.random(-3,3)/1200);
    const osc = audioCtx.createOscillator(), g = audioCtx.createGain();
    const filt = audioCtx.createBiquadFilter(), pan = audioCtx.createStereoPanner();
    osc.type = 'sine'; osc.frequency.value = freq;
    g.gain.setValueAtTime(0, audioCtx.currentTime);
    g.gain.linearRampToValueAtTime(0.06, audioCtx.currentTime + 0.02);
    filt.type = 'lowpass'; filt.frequency.value = 600;
    pan.pan.value = p.map(x, 0, p.width, -1, 1);
    osc.connect(g); g.connect(filt); filt.connect(pan); pan.connect(masterGain);
    osc.start();
    g.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.2);
    osc.stop(audioCtx.currentTime + 0.25);
  }

  function animateStage(index) {
    const data = stages[index];
    const isLast = index === stages.length - 1;

    if (index === 0) {
      const lines = wrapLines(data.lines, titleFontSize);
      p.textSize(titleFontSize);
      const pad = Math.floor(p.width * 0.06);
      const availW = p.width - pad * 2;
      const yStart = p.height / 2 - ((lines.length - 1) * titleSpacing) / 2;
      for (let i = 0; i < lines.length; i++) {
        const line = lines[i];
        if (!line) continue;
        const lineW = p.textWidth(line);
        const gap = line.length > 1 ? (availW - lineW) / (line.length - 1) * 0.7 : 0;
        let x = pad;
        for (let j = 0; j < line.length; j++) {
          const ch = line[j]; const cw = p.textWidth(ch);
          floatingParticles.push(new Particle(ch, x + cw/2, yStart + i*titleSpacing, titleFontSize));
          x += cw + gap;
        }
      }
      return;
    }

    const lines = wrapLines(data.lines, data.fontSize, index > 0);
    let y = isLast
      ? p.height - margin - (lines.length - 1) * data.spacing
      : getStaticBaseY() - ((lines.length - 1) * data.spacing) / 2;
    p.textSize(data.fontSize);
    for (let l = 0; l < lines.length; l++) {
      const line = lines[l];
      if (!line) { y += data.spacing; continue; }
      let x = centerX - p.textWidth(line) / 2;
      for (let i = 0; i < line.length; i++) {
        const ch = line[i]; const w = p.textWidth(ch);
        floatingParticles.push(new Particle(ch, x + w/2, y, data.fontSize));
        x += w;
      }
      y += data.spacing;
    }
  }

  function advanceStage() {
    currentChordStage = stage;
    animateStage(stage);
    currentStatic = null;
    staticHoverHues = {};
    stage++;
    if (stage === stages.length - 1 && !matrixMode) {
      matrixMode = true;
      for (const fp of floatingParticles) { fp.vx = 0; fp.vy = p.random(0.5, 2); }
    }
    if (stage < stages.length) showStatic(stage);
    const hint = document.getElementById('hint');
    if (hint) hint.style.opacity = '0';
  }

  function toggleTheme() {
    isDarkMode = !isDarkMode;
    document.body.style.background = isDarkMode ? '#111' : 'white';
    document.body.classList.toggle('light', !isDarkMode);
  }

  function initAudio() {
    if (!audioCtx) audioCtx = new AudioContext();
    else if (audioCtx.state !== 'running') audioCtx.resume();
    if (!masterGain) {
      masterGain = audioCtx.createGain();
      masterGain.gain.value = 0.6;
      const comp = audioCtx.createDynamicsCompressor();
      comp.threshold.setValueAtTime(-48, audioCtx.currentTime);
      comp.knee.setValueAtTime(60, audioCtx.currentTime);
      comp.ratio.setValueAtTime(12, audioCtx.currentTime);
      comp.attack.setValueAtTime(0.2, audioCtx.currentTime);
      comp.release.setValueAtTime(0.8, audioCtx.currentTime);
      masterGain.connect(comp);
      comp.connect(audioCtx.destination);
    }
  }

  // ── p5 lifecycle ──

  p.setup = function() {
    const hero = document.getElementById('hero');
    p5canvas = p.createCanvas(hero.offsetWidth, hero.offsetHeight);
    p5canvas.parent('hero');
    p.colorMode(p.HSB, 360, 100, 100);
    p.textFont('Kode Mono');
    p.textAlign(p.LEFT, p.CENTER);
    p.noStroke();
    centerX = p.width / 2;
    centerY = p.height / 3;
    computeStages(p.width);
    // build title on first draw frame so font is guaranteed loaded
  };

  p.draw = function() {
    if (!titleReady) {
      buildTitle();
      titleReady = true;
    }
    p.clear();

    for (const fp of floatingParticles) { fp.update(); fp.display(); }

    if (stage === 0) {
      let hoveredIndex = -1;
      for (let i = 0; i < staticParticles.length; i++) {
        if (hoveredIndex === -1 && staticParticles[i].isMouseOver()) hoveredIndex = i;
      }
      for (let i = 0; i < staticParticles.length; i++) {
        const sp = staticParticles[i];
        // no repulsion on stage 0 title — letters stay fixed until released as particles
        sp.hovered = (i === hoveredIndex);
        if (sp.hovered && !sp.wasHovered) { sp.hue = p.random(360); sp.playSound(); }
        sp.wasHovered = sp.hovered;
        sp.update();
        sp.display();
      }
      return;
    }

    if (matrixMode) {
      for (const fp of floatingParticles) {
        fp.y += fp.vy;
        if (fp.y > p.height + 10) { fp.y = p.random(-50, 0); fp.x = p.random(margin, p.width - margin); }
        fp.display();
      }
      if (currentStatic && stage === stages.length - 1) drawStaticText();
      return;
    }

    if (currentStatic && stage < stages.length) drawStaticText();
  };

  p.mousePressed = function() {
    if (p.mouseY < 0 || p.mouseY > p.height) return;
    initAudio();

    for (const fp of floatingParticles) {
      if (fp.isMouseOver()) {
        draggingParticle = fp; fp.isDragging = true;
        fp.offsetX = fp.x - p.mouseX; fp.offsetY = fp.y - p.mouseY;
        fp.playSound(true); return;
      }
    }
    if (!currentStatic && stage >= stages.length) {
      for (const fp of floatingParticles) { fp.vx += p.random(-1,1); fp.vy += p.random(-1,1); }
    }
  };

  p.mouseClicked = function() {
    if (p.mouseY < 0 || p.mouseY > p.height) return;

    if (stage === 0) {
      for (const sp of staticParticles) { if (sp.isMouseOver()) { advanceStage(); return; } }
      toggleTheme(); return;
    }

    if (currentStatic) {
      const s = stages[stage];
      p.textSize(s.fontSize);
      const isLast = stage === stages.length - 1;
      let yStart = isLast
        ? p.height - margin - (currentStatic.length - 1) * s.spacing
        : getStaticBaseY() - ((currentStatic.length - 1) * s.spacing) / 2;
      for (let i = 0; i < currentStatic.length; i++) {
        const line = currentStatic[i];
        if (!line) continue;
        const lw = p.textWidth(line);
        const xStart = centerX - lw / 2;
        const y = yStart + i * s.spacing;
        if (p.mouseX > xStart && p.mouseX < xStart + lw &&
            p.mouseY > y - s.fontSize/2 && p.mouseY < y + s.fontSize/2) {
          advanceStage(); return;
        }
      }
    }
    toggleTheme();
  };

  p.mouseReleased = function() {
    if (draggingParticle) {
      draggingParticle.stopSound(); draggingParticle.isDragging = false; draggingParticle = null;
    }
  };

  p.windowResized = function() {
    const hero = document.getElementById('hero');
    p.resizeCanvas(hero.offsetWidth, hero.offsetHeight);
    centerX = p.width / 2; centerY = p.height / 3;
    computeStages(p.width);
    if (stage === 0) { titleReady = false; }
    else if (stage < stages.length) { showStatic(stage); }
  };

}; // end sketch

new p5(sketch);

</script>
</body>
</html>
